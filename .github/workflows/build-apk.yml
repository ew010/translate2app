name: Build Native Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 配置 Java 环境
      uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: 配置 Flutter 环境
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - name: 在云端动态创建 Flutter 原生工程
      run: |
        flutter create app_project --platforms android
        
    - name: 注入我们的核心代码
      run: |
        cp my_pubspec.yaml app_project/pubspec.yaml
        cp my_main.dart app_project/lib/main.dart

    - name: 🚀注入安卓 14 必需权限与服务类型 (全能防闪退版)
      run: |
        cd app_project
        # 1. 注入所有可能的存储和前台权限
        perl -pi -e 's/<application/<uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"\/>\n    <uses-permission android:name="android.permission.MANAGE_EXTERNAL_STORAGE"\/>\n    <uses-permission android:name="android.permission.FOREGROUND_SERVICE"\/>\n    <uses-permission android:name="android.permission.FOREGROUND_SERVICE_SPECIAL_USE"\/>\n    <application/' android/app/src/main/AndroidManifest.xml
        
        # 2. 核心：为底层推理服务注入 Android 14 必需的 foregroundServiceType
        # 我们直接修改 Service 声明，赋予它 specialUse 类型
        perl -pi -e 's/<application/<application android:requestLegacyExternalStorage="true"/' android/app/src/main/AndroidManifest.xml
        
        # 使用 sed 强行插入服务类型声明 (针对 llama_flutter_android 的 Service 名)
        sed -i "/<\/queries>/a <service android:name=\"com.write4me.llama_flutter_android.InferenceService\" android:foregroundServiceType=\"specialUse\" android:exported=\"false\" \/>" android/app/src/main/AndroidManifest.xml

    - name: 修复 Android NDK 与 API 26 最低版本配置
      run: |
        cd app_project
        if [ -f "android/app/build.gradle.kts" ]; then
          sed -i 's/flutter.minSdkVersion/26/g' android/app/build.gradle.kts
        elif [ -f "android/app/build.gradle" ]; then
          sed -i 's/flutter.minSdkVersion/26/g' android/app/build.gradle
        fi
        flutter pub get

    - name: 自动同意 Android SDK/NDK 许可证
      run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses

    - name: 执行终极编译 (C++ 交叉编译 + 打包 APK)
      run: |
        cd app_project
        flutter build apk --release

    - name: 提取并上传 APK 安装包
      uses: actions/upload-artifact@v4
      with:
        name: AITranslator-Android-APK
        path: app_project/build/app/outputs/flutter-apk/app-release.apk
